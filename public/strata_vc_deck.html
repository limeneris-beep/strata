<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=720">
<title>Strata — VC Deck</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Manrope,sans-serif;background:#0a0e17;color:#fff;overflow:hidden}
.deck{width:1280px;height:720px;position:relative}
.slide{width:1280px;height:720px;display:flex;position:absolute;top:0;left:0;padding:60px 80px;flex-direction:column}
.slide.hidden{display:none}
.nav-hint{position:fixed;bottom:12px;right:16px;font-size:11px;color:#4a5565;font-family:'JetBrains Mono',monospace;z-index:10}
.num{position:absolute;bottom:20px;right:80px;font-size:12px;color:#4a5565;font-family:'JetBrains Mono',monospace}
.accent{color:#00d4aa}
.muted{color:#889aaa}
.dim{color:#4a5565}

/* Slide 1 — Title */
.s1{justify-content:center;padding-top:60px}
.s1 .logo{font-size:72px;font-weight:800;background:linear-gradient(135deg,#00d4aa,#00b894);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px}
.s1 .tagline{font-size:28px;color:#889aaa;font-weight:400;margin-bottom:40px;max-width:700px;line-height:1.3}
.s1 .stat-row{display:flex;gap:50px}
.s1 .stat-num{font-size:42px;font-weight:800;color:#00d4aa;font-family:'JetBrains Mono',monospace}
.s1 .stat-lab{font-size:14px;color:#4a5565;margin-top:4px}
.s1 .footer{position:absolute;bottom:60px;left:80px;display:flex;align-items:center;gap:16px}
.s1 .footer .badge{background:#00d4aa22;border:1px solid #00d4aa44;color:#00d4aa;padding:4px 14px;border-radius:20px;font-size:13px;font-weight:600}
.s1 .footer .names{color:#889aaa;font-size:14px}

/* Slide 2 — Cold Start */
.s2{justify-content:center}
.s2 h2{font-size:14px;color:#00d4aa;text-transform:uppercase;letter-spacing:3px;margin-bottom:12px}
.s2 .headline{font-size:34px;font-weight:700;line-height:1.2;margin-bottom:20px;max-width:800px}
.s2 .big-stat{display:flex;gap:50px;margin-bottom:24px}
.s2 .bs .n{font-size:52px;font-weight:800;color:#00d4aa;font-family:'JetBrains Mono',monospace}
.s2 .bs .l{font-size:13px;color:#4a5565;margin-top:4px}
.s2 .columns{display:flex;gap:24px}
.s2 .col{flex:1;background:#121824;border:1px solid #1e2a3a;border-radius:10px;padding:24px}
.s2 .col .cl{font-size:13px;color:#00d4aa;font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.s2 .col .cd{font-size:13px;color:#889aaa;line-height:1.6}

/* Slide 3 — Three Layers */
.s3{justify-content:center}
.s3 h2{font-size:14px;color:#00d4aa;text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
.s3 .headline{font-size:34px;font-weight:700;line-height:1.2;margin-bottom:28px}
.s3 .layers{display:flex;flex-direction:column;gap:16px}
.s3 .layer{display:flex;align-items:center;gap:20px;background:#121824;border:1px solid #1e2a3a;border-radius:10px;padding:22px 24px}
.s3 .layer.l1{border-left:4px solid #00d4aa}
.s3 .layer.l2{border-left:4px solid #2196F3}
.s3 .layer.l3{border-left:4px solid #FF9800}
.s3 .layer .lnum{font-size:14px;color:#4a5565;font-weight:700;min-width:24px;text-align:center}
.s3 .layer .ltitle{font-weight:700;font-size:15px;color:#fff;min-width:160px}
.s3 .layer .ldesc{font-size:13px;color:#889aaa;line-height:1.5;flex:1}
.s3 .layer .lprio{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;white-space:nowrap}
.s3 .layer.l1 .lprio{background:#00d4aa22;color:#00d4aa}
.s3 .layer.l2 .lprio{background:#2196F322;color:#2196F3}
.s3 .layer.l3 .lprio{background:#FF980022;color:#FF9800}
.s3 .flow{text-align:center;color:#4a5565;font-size:13px;margin-top:18px}

/* Slide 4 — AVL Spotlight */
.s4{justify-content:center}
.s4 h2{font-size:14px;color:#FF9800;text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
.s4 .headline{font-size:34px;font-weight:700;line-height:1.2;margin-bottom:12px}
.s4 .sub{font-size:16px;color:#889aaa;margin-bottom:28px;line-height:1.5}
.s4 .cards{display:flex;gap:24px;margin-bottom:14px}
.s4 .card{flex:1;background:#121824;border:1px solid #1e2a3a;border-radius:10px;padding:24px}
.s4 .card .ct{font-weight:700;color:#FF9800;font-size:15px;margin-bottom:8px}
.s4 .card .cd{font-size:13px;color:#889aaa;line-height:1.6}
.s4 .innovation{background:#0a1e1a;border:1px solid #FF980044;border-radius:10px;padding:18px 24px;text-align:center;font-size:15px;color:#FF9800;font-weight:600}

/* Slide 5 — Intent Orders */
.s5{justify-content:center}
.s5 h2{font-size:14px;color:#2196F3;text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
.s5 .headline{font-size:34px;font-weight:700;line-height:1.2;margin-bottom:12px}
.s5 .sub{font-size:16px;color:#889aaa;margin-bottom:28px}
.s5 .benefits{display:flex;gap:24px}
.s5 .ben{flex:1;background:#121824;border:1px solid #1e2a3a;border-radius:10px;padding:24px;text-align:center}
.s5 .ben .bn{font-size:15px;font-weight:700;color:#2196F3;margin-bottom:8px}
.s5 .ben .bd{font-size:13px;color:#889aaa;line-height:1.5}
.s5 .hype{background:#0a1628;border:1px solid #2196F344;border-radius:10px;padding:18px 24px;text-align:center;font-size:15px;color:#2196F3;font-weight:600;margin-top:20px}

/* Slide 6 — Orbital Pools */
.s-orbital{justify-content:center}
.s-orbital h2{font-size:14px;color:#00d4aa;text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
.s-orbital .headline{font-size:34px;font-weight:700;line-height:1.2;margin-bottom:12px}
.s-orbital .sub{font-size:16px;color:#889aaa;margin-bottom:28px;line-height:1.5}
.s-orbital .cards{display:flex;gap:24px;margin-bottom:14px}
.s-orbital .card{flex:1;background:#121824;border:1px solid #1e2a3a;border-radius:10px;padding:24px}
.s-orbital .card .ct{font-weight:700;color:#00d4aa;font-size:15px;margin-bottom:8px}
.s-orbital .card .cd{font-size:13px;color:#889aaa;line-height:1.6}
.s-orbital .innovation{background:#0a1e1a;border:1px solid #00d4aa44;border-radius:10px;padding:18px 24px;text-align:center;font-size:15px;color:#00d4aa;font-weight:600;line-height:1.5}
.s-orbital .stat-row{display:flex;gap:40px;margin-top:20px}
.s-orbital .stat-num{font-size:36px;font-weight:800;color:#00d4aa;font-family:'JetBrains Mono',monospace}
.s-orbital .stat-lab{font-size:12px;color:#4a5565;margin-top:4px}

/* Slide 7 — Live Devnet */
.s6{justify-content:center}
.s6 h2{font-size:14px;color:#00d4aa;text-transform:uppercase;letter-spacing:3px;margin-bottom:6px}
.s6 .headline{font-size:34px;font-weight:700;margin-bottom:8px}
.s6 .sub{font-size:14px;color:#889aaa;margin-bottom:24px}
.s6 .terminal{background:#0a0e17;border:2px solid #1e2a3a;border-radius:12px;padding:16px;text-align:center;margin-bottom:16px}
.s6 .terminal img{max-width:100%;border-radius:8px}
.s6 .checks{display:flex;gap:16px}
.s6 .check{flex:1;display:flex;align-items:flex-start;gap:8px;font-size:12px;color:#889aaa}
.s6 .check .mark{color:#00d4aa;font-weight:700;font-size:14px;flex-shrink:0}

/* Slide 7 — Depth Nobody Has */
.s7{justify-content:center}
.s7 h2{font-size:14px;color:#00d4aa;text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
.s7 .headline{font-size:34px;font-weight:700;line-height:1.2;margin-bottom:20px}
.s7 .table{width:100%;border-collapse:collapse;margin-bottom:16px}
.s7 th{text-align:left;padding:14px 18px;font-size:12px;color:#4a5565;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #1e2a3a}
.s7 th.us{color:#00d4aa}
.s7 td{padding:14px 18px;font-size:14px;border-bottom:1px solid #1e2a3a11}
.s7 td:first-child{font-weight:600;color:#fff}
.s7 td .check{color:#00d4aa;font-size:16px}
.s7 td .cross{color:#4a2530;font-size:16px}
.s7 .highlight{background:#0a1e1a;border:1px solid #00d4aa44;border-radius:10px;padding:16px 20px;text-align:center;font-size:14px;color:#00d4aa;font-weight:600}

/* Slide 8 — Yield-Bearing Limit Orders */
.s8{justify-content:center}
.s8 h2{font-size:14px;color:#00d4aa;text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
.s8 .headline{font-size:32px;font-weight:700;line-height:1.2;margin-bottom:20px}
.s8 .flow-box{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.s8 .flow-step{flex:1;background:#121824;border:1px solid #1e2a3a;border-radius:10px;padding:20px;text-align:center}
.s8 .flow-step .fsn{font-size:13px;font-weight:700;color:#00d4aa;margin-bottom:4px}
.s8 .flow-step .fsd{font-size:12px;color:#889aaa;line-height:1.4}
.s8 .flow-arrow{color:#00d4aa;font-size:20px;flex-shrink:0}
.s8 .flywheel{background:#0a1e1a;border:1px solid #00d4aa44;border-radius:10px;padding:18px;text-align:center}
.s8 .flywheel .fwt{font-size:12px;color:#4a5565;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.s8 .flywheel .fwc{font-size:15px;color:#fff;font-family:'JetBrains Mono',monospace}
.s8 .flywheel .fwa{color:#00d4aa}

/* Slide 9 — Betting on Liquidity */
.s9{justify-content:center}
.s9 h2{font-size:14px;color:#00d4aa;text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
.s9 .headline{font-size:32px;font-weight:700;line-height:1.2;margin-bottom:20px}
.s9 .trio{display:flex;gap:20px;margin-bottom:20px}
.s9 .card{flex:1;background:#121824;border:1px solid #1e2a3a;border-radius:10px;padding:24px}
.s9 .card .cn{font-weight:700;font-size:16px;color:#00d4aa;margin-bottom:6px}
.s9 .card .cd{font-size:13px;color:#889aaa;line-height:1.5}
.s9 .cycle{background:#0a1e1a;border:1px solid #00d4aa44;border-radius:10px;padding:18px;text-align:center}
.s9 .cycle .ct{font-size:12px;color:#4a5565;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.s9 .cycle .cc{font-size:14px;color:#fff;font-family:'JetBrains Mono',monospace}
.s9 .cycle .ca{color:#00d4aa}

/* Slide 10 — PvP Layer */
.s10{justify-content:center}
.s10 h2{font-size:14px;color:#00d4aa;text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
.s10 .headline{font-size:32px;font-weight:700;line-height:1.2;margin-bottom:12px}
.s10 .sub{font-size:14px;color:#889aaa;margin-bottom:24px}
.s10 .arena{display:flex;gap:24px;margin-bottom:16px}
.s10 .arena .item{flex:1;background:#121824;border:1px solid #1e2a3a;border-radius:10px;padding:24px}
.s10 .arena .item .in{font-weight:700;font-size:15px;color:#00d4aa;margin-bottom:6px}
.s10 .arena .item .id{font-size:12px;color:#889aaa;line-height:1.5}
.s10 .bottom{background:#0a1e1a;border:1px solid #00d4aa44;border-radius:10px;padding:16px;text-align:center;font-size:14px;color:#889aaa;line-height:1.5}

/* Slide 11 — Market */
.s11{justify-content:center}
.s11 h2{font-size:14px;color:#00d4aa;text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
.s11 .headline{font-size:30px;font-weight:700;line-height:1.2;margin-bottom:20px}
.s11 .stats{display:flex;gap:20px;margin-bottom:20px}
.s11 .stat{flex:1;text-align:center;background:#121824;border:1px solid #1e2a3a;border-radius:10px;padding:22px}
.s11 .stat .n{font-size:42px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#00d4aa}
.s11 .stat .l{font-size:12px;color:#4a5565;margin-top:4px}
.s11 .comp{background:#121824;border:1px solid #1e2a3a;border-radius:10px;padding:18px;font-size:13px;color:#889aaa;line-height:1.6}

/* Slide 12 — Roadmap */
.s12{justify-content:center}
.s12 h2{font-size:14px;color:#00d4aa;text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
.s12 .headline{font-size:34px;font-weight:700;margin-bottom:20px}
.s12 .timeline{display:flex;gap:12px}
.s12 .phase{flex:1;background:#121824;border:1px solid #1e2a3a;border-radius:10px;padding:16px;position:relative}
.s12 .phase.now{border-color:#00d4aa44;background:#0a1e1a}
.s12 .phase .when{font-size:11px;color:#4a5565;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.s12 .phase.now .when{color:#00d4aa}
.s12 .phase .pn{font-weight:700;font-size:13px;color:#fff;margin-bottom:6px}
.s12 .phase .pd{font-size:11px;color:#889aaa;line-height:1.4}

/* Slide 13 — MEV */
.s13{justify-content:center}
.s13 h2{font-size:14px;color:#00d4aa;text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
.s13 .headline{font-size:34px;font-weight:700;line-height:1.2;margin-bottom:16px}
.s13 .mev-box{display:flex;gap:24px;margin-bottom:20px}
.s13 .mev-box .left{flex:1}
.s13 .mev-box .right{flex:1}
.s13 .mev-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#121824;border:1px solid #1e2a3a;border-radius:8px;margin-bottom:10px}
.s13 .mev-row .mr-icon{font-size:22px;flex-shrink:0;width:32px;text-align:center}
.s13 .mev-row .mr-title{font-weight:600;font-size:14px;color:#fff}
.s13 .mev-row .mr-desc{font-size:12px;color:#4a5565}
.s13 .nobody{background:#0a1e1a;border:1px solid #00d4aa44;border-radius:10px;padding:16px;text-align:center;font-size:15px;color:#00d4aa;font-weight:600}

/* Slide 14 — Team */
.s14{justify-content:center}
.s14 h2{font-size:14px;color:#00d4aa;text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
.s14 .headline{font-size:34px;font-weight:700;margin-bottom:24px}
.s14 .team{display:flex;gap:40px;margin-bottom:20px}
.s14 .member{flex:1;display:flex;gap:16px;align-items:center}
.s14 .member .avatar{width:56px;height:56px;border-radius:50%;background:#00d4aa22;border:2px solid #00d4aa44;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#00d4aa;flex-shrink:0}
.s14 .member .info .name{font-weight:700;font-size:20px;color:#fff}
.s14 .member .info .role{font-size:12px;color:#4a5565;margin-bottom:6px}
.s14 .member .info .bio{font-size:12px;color:#889aaa;line-height:1.4}
.s14 .agent-note{background:#0a1e1a;border:1px solid #00d4aa44;border-radius:10px;padding:16px;text-align:center;font-size:13px;color:#889aaa;line-height:1.5}

/* Slide 15 — The Ask */
.s15{justify-content:center}
.s15 h2{font-size:14px;color:#00d4aa;text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
.s15 .headline{font-size:34px;font-weight:700;margin-bottom:20px}
.s15 .layout{display:flex;gap:30px}
.s15 .left-col{flex:1}
.s15 .right-col{flex:1}
.s15 .ask-num{font-size:56px;font-weight:800;color:#00d4aa;font-family:'JetBrains Mono',monospace;margin-bottom:4px}
.s15 .ask-lab{font-size:13px;color:#4a5565;margin-bottom:20px}
.s15 .alloc{margin-bottom:16px}
.s15 .alloc .row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #1e2a3a22}
.s15 .alloc .row .cat{font-size:13px;color:#889aaa;flex:1;text-align:left}
.s15 .alloc .row .amt{font-size:13px;font-weight:600;color:#fff;font-family:'JetBrains Mono',monospace;width:80px;text-align:center}
.s15 .alloc .row .pct{font-size:13px;color:#00d4aa;width:50px;text-align:center}
.s15 .looking h3{font-size:13px;color:#4a5565;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.s15 .looking .item{display:flex;align-items:center;gap:8px;font-size:13px;color:#889aaa;margin-bottom:6px}
.s15 .looking .item .chk{color:#00d4aa}
.s15 .cta{position:absolute;bottom:60px;left:80px;right:80px;text-align:center;font-size:15px;color:#00d4aa;font-weight:600}
</style>
</head>
<body>
<div class="deck" id="deck"></div>
<div class="nav-hint">← → arrows or click to advance</div>

<script>
const slides = [
  // Slide 1 — Title
  () => `
    <div class="slide s1">
      <div class="logo">Strata</div>
      <div class="tagline">The deepest liquidity layer on Solana.<br>Real order book. Virtualized depth. Every trade fills. Guaranteed.</div>
      <div class="stat-row">
        <div><div class="stat-num">3 layers</div><div class="stat-lab">One unified book</div></div>
        <div><div class="stat-num">100%</div><div class="stat-lab">Fill guarantee</div></div>
        <div><div class="stat-num">100%</div><div class="stat-lab">Liquidity efficiency</div></div>
      </div>
      <div class="footer">
        <div class="badge">SEED STAGE</div>
        <div class="names">Phizen & Team · stratabook.org</div>
      </div>
      <div class="num">1/16</div>
    </div>`,

  // Slide 2 — Cold Start Problem
  () => `
    <div class="slide s2">
      <h2>THE COLD START PROBLEM</h2>
      <div class="headline">Order books dominate global markets.<br>On-chain, they launch empty.</div>
      <div class="big-stat">
        <div class="bs"><div class="n">$1.6T</div><div class="l">Solana DEX volume in 2025</div></div>
        <div class="bs"><div class="n">~$100T</div><div class="l">Global CLOB volume (stocks, forex, crypto CEXes)</div></div>
        <div class="bs"><div class="n">0</div><div class="l">Solana DEXes with real order book liquidity</div></div>
      </div>
      <div class="columns">
        <div class="col">
          <div class="cl">The CLOB Paradox</div>
          <div class="cd">Order books are the dominant exchange model across every asset class — NYSE, Nasdaq, Binance, Bybit. Traders demand visible depth, limit orders, and precise execution. But on-chain, CLOBs fail because of the cold start: empty books attract no traders, and no traders means no liquidity. It's a death spiral.</div>
        </div>
        <div class="col">
          <div class="cl">Solana's Missing Piece</div>
          <div class="cd">Solana is the #2 spot venue globally by volume — ahead of Coinbase, Bybit, and Bitget. Yet every attempt at an on-chain order book has failed. Phoenix is too thin. OpenBook has no depth. AMMs hide liquidity behind a single price. The volume is here. The infrastructure isn't.</div>
        </div>
      </div>
      <div class="num">2/16</div>
    </div>`,

  // Slide 3 — Three Layers
  () => `
    <div class="slide s3">
      <h2>THE SOLUTION</h2>
      <div class="headline">Three liquidity sources. One unified book.</div>
      <div class="layers">
        <div class="layer l1">
          <div class="lnum">1</div>
          <div class="ltitle">Real Limit/Market Orders</div>
          <div class="ldesc">User limit orders escrowed on-chain in UserVault PDAs. Hard commitment, trustless cancel. Standard order types: Limit, IOC, FOK, Post-Only.</div>
          <div class="lprio">PRIORITY</div>
        </div>
        <div class="layer l2">
          <div class="lnum">2</div>
          <div class="ltitle">Intent Orders</div>
          <div class="ldesc">Market makers post intent on-chain — one deposit covers 50+ price levels. Speed + capital efficiency. Reputation-gated. Professional liquidity without capital lockup.</div>
          <div class="lprio">DEEP LIQUIDITY</div>
        </div>
        <div class="layer l3">
          <div class="lnum">3</div>
          <div class="ltitle">AVL — Aggregated Virtualized Liquidity</div>
          <div class="ldesc">We aggregate on-chain liquidity via Sonar + AMM depth and virtualize it as tradeable depth on the book. Not cosmetic — you trade against it. Every pair is deep on day one.</div>
          <div class="lprio">GUARANTEED FILL</div>
        </div>
      </div>
      <div class="flow">Every taker order cascades through priority. AVL guarantees 100% fill. The book is never empty.</div>
      <div class="num">3/16</div>
    </div>`,

  // Slide 4 — AVL Spotlight
  () => `
    <div class="slide s4">
      <h2>THE INNOVATION</h2>
      <div class="headline">AVL — Aggregated Virtualized Liquidity</div>
      <div class="sub">We sample real liquidity via Sonar and on-chain AMMs, then virtualize it as <span class="accent">tradeable depth</span> on the order book. Not a UI trick. Not a projection. You trade against this depth — atomic execution through CPI.</div>
      <div class="cards">
        <div class="card">
          <div class="ct">Deep on Day One</div>
          <div class="cd">Any SPL pair with on-chain liquidity is deep from the moment it's listed. No market makers. No bootstrapping period. No paid incentive programs. The liquidity already exists — we surface it.</div>
        </div>
        <div class="card">
          <div class="ct">Atomic CPI Execution</div>
          <div class="cd">When a taker order hits AVL depth, it executes atomically through Sonar CPI swaps. Price guard + slippage protection baked into the instruction. If execution price deviates, the trade reverts.</div>
        </div>
        <div class="card">
          <div class="ct">No Other DEX Has This</div>
          <div class="cd">Phoenix shows their own liquidity only. Jupiter shows a swap price. No one aggregates and virtualizes external liquidity as visible, tradeable order book depth. This is a new primitive.</div>
        </div>
      </div>
      <div class="innovation">AVL is the cold start killer. Books that launch with deep, tradeable order books on every pair.</div>
      <div class="num">4/16</div>
    </div>`,

  // Slide 5 — Intent Orders
  () => `
    <div class="slide s5">
      <h2>PROFESSIONAL LIQUIDITY</h2>
      <div class="headline">Intent Orders — Fill or Get Penalized</div>
      <div class="sub">Market makers post intent directly on the order book. No vault. No deposit. Just a signed commitment to fill at a given spread. When a taker hits their level, they fill — or their reputation drops. Missed fills get penalized on-chain.</div>
      <div class="benefits">
        <div class="ben">
          <div class="bn">Post Intent. No Vault.</div>
          <div class="bd">MMs post intent on-chain — a signed offer at a spread. No capital locked. No vault required. The book shows their depth immediately.</div>
        </div>
        <div class="ben">
          <div class="bn">Reputation Penalties</div>
          <div class="bd">Every missed fill is recorded on-chain. Reputation decays. Persistent non-fillers get deprioritized or removed. Honest MMs rise to the top.</div>
        </div>
        <div class="ben">
          <div class="bn">Capital Efficiency</div>
          <div class="bd">One intent covers the full quoted range. No capital locked per level. MMs can quote across dozens of pairs without tying up millions in vaults.</div>
        </div>
      </div>
      <div class="hype">Professional liquidity without paid MM programs. Reputation enforces what rebates used to buy.</div>
      <div class="num">5/16</div>
    </div>`,

  // Slide 6 — Orbital Pools
  () => `
    <div class="slide s-orbital">
      <h2>LIQUIDITY INNOVATION</h2>
      <div class="headline">Orbital Pools. One pool, every pair.</div>
      <div class="sub">The first production Orbital AMM — concentrated liquidity generalized to an n-dimensional sphere. Instead of one pair per pool, <span class="accent">a single pool serves every pair in a basket simultaneously</span> — deeper, cheaper, and arbitrage-free across the whole set.</div>
      <div class="cards">
        <div class="card">
          <div class="ct">220× Capital Efficiency</div>
          <div class="cd">A flat book wastes capital at prices that never happen. Orbital packs maker liquidity into the ±10bps band where trades actually land. $1 does the work of ~$220 near the peg.</div>
        </div>
        <div class="card">
          <div class="ct">Triangular-Arb-Free</div>
          <div class="cd">One n-asset pool = no triangular arbitrage between pairs. The pool stays internally consistent. Makers don't lose to arb bots racing between fragmented pools.</div>
        </div>
        <div class="card">
          <div class="ct">First Basket: LSTs</div>
          <div class="cd">Up to 8 liquid staking tokens in one pool — jitoSOL, mSOL, bSOL, JupSOL, hSOL and more. Every LST-to-LST pair trades instantly. Same engine scales to stables, BTC wrappers, and any tight-band basket.</div>
        </div>
      </div>
      <div class="innovation">Backstopped by AVL from day one. No cold start for new baskets — the book is deep before the first maker arrives. <strong>First production Orbital AMM, anywhere.</strong></div>
      <div class="num">6/16</div>
    </div>`,

// State
let current = 0;

function render() {
  document.getElementById('deck').innerHTML = slides[current]();
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    current = Math.min(current + 1, slides.length - 1);
    render();
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    current = Math.max(current - 1, 0);
    render();
  }
});

// Click anywhere to advance
document.addEventListener('click', () => {
  current = Math.min(current + 1, slides.length - 1);
  render();
});

// Expose for Playwright
window.slideDeck = {
  get current() { return current; },
  set current(v) { current = v; },
  render() { render(); },
  get count() { return slides.length; }
};

render();
</script>
